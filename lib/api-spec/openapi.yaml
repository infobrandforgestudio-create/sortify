openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Email Organizer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Email category management
  - name: emails
    description: Email retrieval
  - name: sync
    description: Gmail sync and status
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories with email counts
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a single category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories/{id}/rules:
    get:
      operationId: listCategoryRules
      tags: [categories]
      summary: List rules for a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryRule"
    post:
      operationId: createCategoryRule
      tags: [categories]
      summary: Add a rule to a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleInput"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryRule"
        "404":
          description: Category not found

  /categories/{id}/rules/{ruleId}:
    delete:
      operationId: deleteCategoryRule
      tags: [categories]
      summary: Delete a rule from a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ruleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /emails:
    post:
      operationId: createEmail
      tags: [emails]
      summary: Manually add an email to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmailInput"
      responses:
        "201":
          description: Created email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDetail"
    get:
      operationId: listEmails
      tags: [emails]
      summary: List emails, optionally filtered by category
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: uncategorized
          in: query
          required: false
          schema:
            type: ["boolean", "null"]
        - name: search
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of emails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailListResponse"

  /emails/{id}:
    get:
      operationId: getEmail
      tags: [emails]
      summary: Get a single email with full body
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDetail"
        "404":
          description: Not found

  /emails/{id}/assign:
    post:
      operationId: assignEmailCategory
      tags: [emails]
      summary: Manually assign an email to a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailAssignInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDetail"

  /imap/config:
    get:
      operationId: getImapConfig
      tags: [sync]
      summary: Get current IMAP configuration (password omitted)
      responses:
        "200":
          description: Current config or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImapConfigResponse"
    post:
      operationId: saveImapConfig
      tags: [sync]
      summary: Save or update IMAP configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImapConfigInput"
      responses:
        "200":
          description: Saved config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImapConfigResponse"

  /imap/test:
    post:
      operationId: testImapConfig
      tags: [sync]
      summary: Test IMAP connection with given credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImapConfigInput"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImapTestResult"

  /sync:
    post:
      operationId: triggerSync
      tags: [sync]
      summary: Trigger email sync and AI categorization
      responses:
        "200":
          description: Sync started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [sync]
      summary: Get sync and Gmail connection status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        color:
          type: string
        emailCount:
          type: integer
        ruleCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, description, color, emailCount, ruleCount, createdAt, updatedAt]

    CategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        color:
          type: string
      required: [name, description]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        color:
          type: string

    CategoryRule:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        fieldType:
          type: string
          enum: [sender, subject, body]
        operator:
          type: string
          enum: [contains, equals, starts_with, ends_with]
        value:
          type: string
        createdAt:
          type: string
      required: [id, categoryId, fieldType, operator, value, createdAt]

    CreateRuleInput:
      type: object
      properties:
        fieldType:
          type: string
          enum: [sender, subject, body]
        operator:
          type: string
          enum: [contains, equals, starts_with, ends_with]
        value:
          type: string
          minLength: 1
      required: [fieldType, operator, value]

    Email:
      type: object
      properties:
        id:
          type: integer
        gmailId:
          type: string
        subject:
          type: string
        fromAddress:
          type: string
        snippet:
          type: string
        receivedAt:
          type: string
        isRead:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        assignedBy:
          type: ["string", "null"]
      required: [id, gmailId, subject, fromAddress, snippet, receivedAt, isRead, categoryId, categoryName, categoryColor, assignedBy]

    EmailAttachment:
      type: object
      properties:
        id:
          type: integer
        emailId:
          type: integer
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
      required: [id, emailId, filename, contentType, size]

    EmailDetail:
      type: object
      properties:
        id:
          type: integer
        gmailId:
          type: string
        subject:
          type: string
        fromAddress:
          type: string
        snippet:
          type: string
        body:
          type: string
        htmlBody:
          type: string
        receivedAt:
          type: string
        isRead:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        assignedBy:
          type: ["string", "null"]
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/EmailAttachment"
      required: [id, gmailId, subject, fromAddress, snippet, body, htmlBody, receivedAt, isRead, categoryId, categoryName, categoryColor, assignedBy, attachments]

    EmailListResponse:
      type: object
      properties:
        emails:
          type: array
          items:
            $ref: "#/components/schemas/Email"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      required: [emails, total, offset, limit]

    ImapConfigInput:
      type: object
      properties:
        email:
          type: string
        imapHost:
          type: string
        imapPort:
          type: integer
        username:
          type: string
        password:
          type: string
        useSsl:
          type: boolean
      required: [email, imapHost, imapPort, username, password]

    ImapConfigResponse:
      type: object
      properties:
        configured:
          type: boolean
        email:
          type: ["string", "null"]
        imapHost:
          type: ["string", "null"]
        imapPort:
          type: ["integer", "null"]
        username:
          type: ["string", "null"]
        useSsl:
          type: ["boolean", "null"]
      required: [configured, email, imapHost, imapPort, username, useSsl]

    ImapTestResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    CreateEmailInput:
      type: object
      properties:
        subject:
          type: string
          minLength: 1
        fromAddress:
          type: string
          minLength: 1
        body:
          type: string
        receivedAt:
          type: ["string", "null"]
      required: [subject, fromAddress, body]

    EmailAssignInput:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
      required: [categoryId]

    SyncStatus:
      type: object
      properties:
        connected:
          type: boolean
        lastSyncAt:
          type: ["string", "null"]
        totalEmails:
          type: integer
        isSyncing:
          type: boolean
        message:
          type: ["string", "null"]
      required: [connected, lastSyncAt, totalEmails, isSyncing, message]

    CategoryStat:
      type: object
      properties:
        categoryId:
          type: integer
        name:
          type: string
        color:
          type: string
        count:
          type: integer
      required: [categoryId, name, color, count]

    Stats:
      type: object
      properties:
        totalEmails:
          type: integer
        categorizedEmails:
          type: integer
        uncategorizedEmails:
          type: integer
        totalCategories:
          type: integer
        emailsPerCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStat"
        lastSyncAt:
          type: ["string", "null"]
      required: [totalEmails, categorizedEmails, uncategorizedEmails, totalCategories, emailsPerCategory, lastSyncAt]
